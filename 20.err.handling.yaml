- name: doing on loops
  hosts: local
  connection: local
  tasks:
  - name: check user exsist or not
    ansible.builtin.command: id shiv
    register: user_output
    ignore_errors: true

  - name: print user_output
    ansible.builtin.debug:
      msg: "{{ user_output }}"


- name: create user
  ansible.builtin.command: sudo useradd shiv
  when: user_output.rc != 0